serenity {
    project.name= "Login App Mobile Tests"
    take.screenshots = AFTER_EACH_STEP
    report.encoding = "UTF-8"
}

webdriver {
    driver = "appium"
    autodownload = false
}

appium {
    hub = "http://127.0.0.1:4723"
    platformName = "Android"
    automationName = "UiAutomator2"
    deviceName = "emulator-5554"
    appPackage = "edu.pe.cibertec.loginappdemo"
    appActivity = "edu.pe.cibertec.loginappdemo.MainActivity"
    noReset = true
    newCommandTimeout = 120
    process.desired.capabilities = true
    additional.capabilities = "automationName,deviceName,appPackage,appActivity,noReset,newCommandTimeout"
}
